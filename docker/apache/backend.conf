<VirtualHost *:8090>
    ServerName localhost
    DocumentRoot /var/www/html/goldmember/backend/web

    # Forward selected container env vars to PHP.
    PassEnv CHATBOT_API_KEY

    <Directory /var/www/html/goldmember/backend/web>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/backend-error.log
    CustomLog ${APACHE_LOG_DIR}/backend-access.log combined
</VirtualHost>

