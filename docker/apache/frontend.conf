<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot /var/www/html/goldmember/frontend/web

    <Directory /var/www/html/goldmember/frontend/web>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    ErrorLog  ${APACHE_LOG_DIR}/frontend-error.log
    CustomLog ${APACHE_LOG_DIR}/frontend-access.log combined
</VirtualHost>

