<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot /var/www/html/goldmember/frontend/web

    <Directory /var/www/html/goldmember/frontend/web>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Gzip compression ────────────────────────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
        AddOutputFilterByType DEFLATE application/javascript application/json
        AddOutputFilterByType DEFLATE application/x-font-ttf font/opentype image/svg+xml
        DeflateCompressionLevel 6
    </IfModule>

    # ── Browser cache headers for static assets ──────────────────────────────
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg        "access plus 1 year"
        ExpiresByType image/png         "access plus 1 year"
        ExpiresByType image/gif         "access plus 1 year"
        ExpiresByType image/svg+xml     "access plus 1 year"
        ExpiresByType image/webp        "access plus 1 year"
        ExpiresByType text/css          "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType application/x-font-woff "access plus 1 year"
        ExpiresByType font/woff2        "access plus 1 year"
    </IfModule>

    <IfModule mod_headers.c>
        <FilesMatch "\.(css|js|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico)$">
            Header set Cache-Control "public, max-age=2592000"
        </FilesMatch>
    </IfModule>

    ErrorLog  ${APACHE_LOG_DIR}/frontend-error.log
    CustomLog ${APACHE_LOG_DIR}/frontend-access.log combined
</VirtualHost>
