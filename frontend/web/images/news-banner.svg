<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1442 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="70%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d2a2a"/>
      <stop offset="100%" stop-color="#060e0e"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#13B2AD" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#13B2AD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="blur8">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1442" height="400" fill="url(#bgGrad)"/>

  <!-- Ambient glow right side (where illustration is) -->
  <ellipse cx="1100" cy="200" rx="400" ry="260" fill="url(#glowTeal)" filter="url(#blur8)"/>
  <ellipse cx="980" cy="320" rx="200" ry="120" fill="url(#glowGold)" filter="url(#blur8)"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.06" stroke="#53E2D9" stroke-width="1">
    <line x1="0" y1="80" x2="1442" y2="80"/>
    <line x1="0" y1="160" x2="1442" y2="160"/>
    <line x1="0" y1="240" x2="1442" y2="240"/>
    <line x1="0" y1="320" x2="1442" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="760" y1="0" x2="760" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/>
    <line x1="1280" y1="0" x2="1280" y2="400"/>
  </g>

  <!-- ===== RIGHT SIDE ILLUSTRATION: Price chart + gold coins ===== -->

  <!-- Large price chart -->
  <g transform="translate(780, 50)" opacity="0.9" filter="url(#glow)">
    <!-- Chart area background -->
    <rect x="0" y="0" width="460" height="260" rx="8" fill="#0a1e1e" fill-opacity="0.7" stroke="#13B2AD" stroke-width="1" stroke-opacity="0.4"/>

    <!-- Chart grid -->
    <g stroke="#13B2AD" stroke-width="0.4" opacity="0.3">
      <line x1="40" y1="40" x2="440" y2="40"/>
      <line x1="40" y1="80" x2="440" y2="80"/>
      <line x1="40" y1="120" x2="440" y2="120"/>
      <line x1="40" y1="160" x2="440" y2="160"/>
      <line x1="40" y1="200" x2="440" y2="200"/>
      <line x1="100" y1="30" x2="100" y2="220"/>
      <line x1="180" y1="30" x2="180" y2="220"/>
      <line x1="260" y1="30" x2="260" y2="220"/>
      <line x1="340" y1="30" x2="340" y2="220"/>
      <line x1="420" y1="30" x2="420" y2="220"/>
    </g>

    <!-- Y-axis labels -->
    <g font-family="monospace" font-size="10" fill="#53E2D9" opacity="0.7">
      <text x="8" y="44">3400</text>
      <text x="8" y="84">3350</text>
      <text x="8" y="124">3300</text>
      <text x="8" y="164">3250</text>
      <text x="8" y="204">3200</text>
    </g>

    <!-- X-axis labels -->
    <g font-family="monospace" font-size="9" fill="#53E2D9" opacity="0.5">
      <text x="90" y="235" text-anchor="middle">Jan</text>
      <text x="170" y="235" text-anchor="middle">Feb</text>
      <text x="250" y="235" text-anchor="middle">Mar</text>
      <text x="330" y="235" text-anchor="middle">Apr</text>
      <text x="410" y="235" text-anchor="middle">May</text>
    </g>

    <!-- Fill area under line -->
    <path d="M 40 190 L 80 175 L 120 160 L 160 170 L 200 145 L 240 130 L 280 115 L 320 100 L 360 85 L 400 70 L 440 55 L 440 220 L 40 220 Z"
          fill="#13B2AD" fill-opacity="0.08"/>

    <!-- Main price line -->
    <polyline points="40,190 80,175 120,160 160,170 200,145 240,130 280,115 320,100 360,85 400,70 440,55"
              fill="none" stroke="#53E2D9" stroke-width="2.5" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Data point dots -->
    <g fill="#53E2D9" filter="url(#glow)">
      <circle cx="40" cy="190" r="3"/>
      <circle cx="120" cy="160" r="3"/>
      <circle cx="200" cy="145" r="3"/>
      <circle cx="280" cy="115" r="3"/>
      <circle cx="360" cy="85" r="3"/>
      <circle cx="440" cy="55" r="4"/>
    </g>

    <!-- Secondary line (silver) -->
    <polyline points="40,200 80,195 120,185 160,188 200,175 240,165 280,158 320,150 360,140 400,132 440,120"
              fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.5"/>

    <!-- Chart title -->
    <text x="230" y="18" text-anchor="middle" font-family="Roboto,sans-serif" font-size="11" fill="#D4A017" letter-spacing="1">GOLD SPOT PRICE  (USD/oz)</text>

    <!-- Live badge -->
    <rect x="365" y="6" width="78" height="18" rx="9" fill="#D4A017" opacity="0.9"/>
    <circle cx="375" cy="15" r="3" fill="#fff">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="392" y="19" font-family="Roboto,sans-serif" font-size="9" fill="#000" font-weight="bold" letter-spacing="1">LIVE</text>

    <!-- Current price tag -->
    <rect x="400" y="48" width="55" height="20" rx="4" fill="#D4A017" opacity="0.9"/>
    <text x="427" y="62" text-anchor="middle" font-family="monospace" font-size="10" fill="#000" font-weight="bold">3,310</text>
  </g>

  <!-- Gold coins stack -->
  <g transform="translate(850, 280)" opacity="0.95">
    <!-- Shadow -->
    <ellipse cx="60" cy="90" rx="55" ry="10" fill="#000" opacity="0.3" filter="url(#blur4)"/>
    <!-- Bottom coin -->
    <ellipse cx="60" cy="80" rx="52" ry="12" fill="#8B6914"/>
    <ellipse cx="60" cy="74" rx="52" ry="12" fill="#C8941F"/>
    <ellipse cx="60" cy="68" rx="52" ry="12" fill="#D4A017"/>
    <!-- Middle coin -->
    <ellipse cx="60" cy="58" rx="48" ry="11" fill="#8B6914"/>
    <ellipse cx="60" cy="52" rx="48" ry="11" fill="#C8941F"/>
    <ellipse cx="60" cy="46" rx="48" ry="11" fill="#D4A017"/>
    <!-- Top coin -->
    <ellipse cx="60" cy="36" rx="44" ry="10" fill="#8B6914"/>
    <ellipse cx="60" cy="30" rx="44" ry="10" fill="#C8941F"/>
    <ellipse cx="60" cy="24" rx="44" ry="10" fill="#D4A017"/>
    <!-- Shine -->
    <ellipse cx="45" cy="20" rx="18" ry="5" fill="#fff" opacity="0.2"/>
    <!-- Au symbol -->
    <text x="60" y="28" text-anchor="middle" font-family="serif" font-size="16" fill="#fff" opacity="0.6" font-weight="bold">Au</text>
  </g>

  <!-- Floating coin 1 -->
  <g transform="translate(1150, 100)">
    <ellipse cx="30" cy="14" rx="30" ry="14" fill="#8B6914" opacity="0.9"/>
    <ellipse cx="30" cy="10" rx="30" ry="14" fill="#D4A017"/>
    <ellipse cx="22" cy="6" rx="12" ry="4" fill="#fff" opacity="0.15"/>
    <text x="30" y="14" text-anchor="middle" font-family="serif" font-size="11" fill="#fff" opacity="0.5" font-weight="bold">Au</text>
  </g>

  <!-- Floating coin 2 -->
  <g transform="translate(1250, 55)" opacity="0.7">
    <ellipse cx="22" cy="10" rx="22" ry="10" fill="#8B6914"/>
    <ellipse cx="22" cy="7" rx="22" ry="10" fill="#C8941F"/>
    <ellipse cx="16" cy="4" rx="9" ry="3" fill="#fff" opacity="0.15"/>
  </g>

  <!-- Small scattered coins -->
  <g opacity="0.6">
    <ellipse cx="1360" cy="160" rx="18" ry="8" fill="#8B6914"/>
    <ellipse cx="1360" cy="157" rx="18" ry="8" fill="#D4A017"/>

    <ellipse cx="1390" cy="260" rx="14" ry="6" fill="#8B6914"/>
    <ellipse cx="1390" cy="258" rx="14" ry="6" fill="#C8941F"/>
  </g>

  <!-- Sparkles / stars -->
  <g fill="#D4A017" filter="url(#glow)">
    <polygon points="1340,80 1343,88 1351,88 1345,93 1347,101 1340,96 1333,101 1335,93 1329,88 1337,88" opacity="0.7"/>
    <polygon points="1410,130 1412,136 1418,136 1413,140 1415,146 1410,142 1405,146 1407,140 1402,136 1408,136" opacity="0.5" transform="scale(0.7) translate(610,80)"/>
  </g>

  <!-- Tick lines (market ticks) -->
  <g opacity="0.35" stroke="#D4A017" stroke-width="1.5">
    <line x1="1320" y1="200" x2="1320" y2="230"/>
    <line x1="1315" y1="208" x2="1325" y2="208"/>
    <line x1="1335" y1="215" x2="1335" y2="240"/>
    <line x1="1330" y1="220" x2="1340" y2="220"/>
    <line x1="1350" y1="195" x2="1350" y2="225"/>
    <line x1="1345" y1="203" x2="1355" y2="203"/>
    <line x1="1365" y1="210" x2="1365" y2="240"/>
    <line x1="1360" y1="218" x2="1370" y2="218"/>
    <line x1="1380" y1="190" x2="1380" y2="220"/>
    <line x1="1375" y1="198" x2="1385" y2="198"/>
  </g>

  <!-- Horizontal teal accent line -->
  <line x1="0" y1="398" x2="1442" y2="398" stroke="#13B2AD" stroke-width="2" opacity="0.5"/>
  <line x1="0" y1="2" x2="600" y2="2" stroke="#13B2AD" stroke-width="1" opacity="0.2"/>

  <!-- Left fade gradient to make text readable -->
  <defs>
    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#060e0e" stop-opacity="0.85"/>
      <stop offset="45%" stop-color="#060e0e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#060e0e" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="900" height="400" fill="url(#leftFade)"/>
</svg>
