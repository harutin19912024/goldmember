<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1442 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgProfile" cx="60%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#0a1a20"/>
      <stop offset="100%" stop-color="#050a0a"/>
    </radialGradient>
    <radialGradient id="tealAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#13B2AD" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#13B2AD" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="goldAura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="avatarGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e3a3a"/>
      <stop offset="100%" stop-color="#0d2020"/>
    </radialGradient>
    <linearGradient id="ringGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5D060"/>
      <stop offset="35%" stop-color="#D4A017"/>
      <stop offset="65%" stop-color="#8B6200"/>
      <stop offset="100%" stop-color="#F5D060"/>
    </linearGradient>
    <linearGradient id="medalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0CC50"/>
      <stop offset="50%" stop-color="#C8941F"/>
      <stop offset="100%" stop-color="#F0CC50"/>
    </linearGradient>
    <linearGradient id="ribbonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d8f8a"/>
      <stop offset="50%" stop-color="#13B2AD"/>
      <stop offset="100%" stop-color="#0d8f8a"/>
    </linearGradient>
    <linearGradient id="leftFadeP" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#050a0a" stop-opacity="0.92"/>
      <stop offset="42%" stop-color="#050a0a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#050a0a" stop-opacity="0"/>
    </linearGradient>
    <filter id="gp">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softP">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="dropP">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#13B2AD" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1442" height="400" fill="url(#bgProfile)"/>

  <!-- Ambient glows -->
  <ellipse cx="1020" cy="180" rx="380" ry="260" fill="url(#tealAura)" filter="url(#softP)"/>
  <ellipse cx="1250" cy="320" rx="200" ry="140" fill="url(#goldAura)" filter="url(#softP)"/>

  <!-- Concentric circles (decorative) -->
  <g opacity="0.07" stroke="#53E2D9" stroke-width="1" fill="none">
    <circle cx="1080" cy="200" r="280"/>
    <circle cx="1080" cy="200" r="220"/>
    <circle cx="1080" cy="200" r="160"/>
  </g>

  <!-- ===== MAIN AVATAR CIRCLE ===== -->
  <g transform="translate(850, 60)" filter="url(#dropP)">
    <!-- Outer gold ring -->
    <circle cx="140" cy="140" r="132" fill="none" stroke="url(#ringGold)" stroke-width="6"/>
    <!-- Outer teal ring -->
    <circle cx="140" cy="140" r="138" fill="none" stroke="#13B2AD" stroke-width="1.5" opacity="0.4"/>
    <!-- Avatar background -->
    <circle cx="140" cy="140" r="125" fill="url(#avatarGrad)"/>

    <!-- Person silhouette -->
    <!-- Head -->
    <circle cx="140" cy="88" r="32" fill="#1e4040"/>
    <circle cx="140" cy="88" r="32" fill="#13B2AD" fill-opacity="0.15"/>
    <!-- Body / shoulders -->
    <path d="M 60 210 Q 80 165 140 155 Q 200 165 220 210 Q 190 200 140 198 Q 90 200 60 210 Z"
          fill="#1e4040"/>
    <path d="M 60 210 Q 80 165 140 155 Q 200 165 220 210"
          fill="#13B2AD" fill-opacity="0.12"/>

    <!-- Subtle glow on head -->
    <circle cx="126" cy="78" r="12" fill="#fff" opacity="0.07"/>

    <!-- Teal highlight arc on ring -->
    <path d="M 35 100 A 130 130 0 0 1 160 18" fill="none" stroke="#53E2D9" stroke-width="4" opacity="0.3" stroke-linecap="round"/>
  </g>

  <!-- ===== GOLD MEMBER BADGE (medal) ===== -->
  <g transform="translate(1120, 90)" filter="url(#gp)">
    <!-- Ribbon top -->
    <rect x="14" y="0" width="42" height="28" rx="4" fill="url(#ribbonGrad)"/>
    <text x="35" y="18" text-anchor="middle" font-family="Roboto,sans-serif" font-size="9"
          fill="#fff" font-weight="bold" letter-spacing="0.5">MEMBER</text>

    <!-- Medal circle -->
    <circle cx="35" cy="68" r="45" fill="#9A7010"/>
    <circle cx="35" cy="65" r="45" fill="url(#medalGrad)"/>
    <circle cx="35" cy="65" r="38" fill="none" stroke="#8B6200" stroke-width="3"/>
    <!-- Star in medal -->
    <polygon points="35,42 40,56 55,56 43,65 47,79 35,71 23,79 27,65 15,56 30,56"
             fill="#fff" fill-opacity="0.85"/>
    <!-- Au text -->
    <text x="35" y="104" text-anchor="middle" font-family="serif" font-size="11"
          fill="#8B6200" font-weight="bold" letter-spacing="1">GOLD</text>
    <!-- Shine -->
    <ellipse cx="22" cy="52" rx="10" ry="5" fill="#fff" opacity="0.2" transform="rotate(-20,22,52)"/>
  </g>

  <!-- ===== DECORATIVE ELEMENTS ===== -->

  <!-- Floating stars -->
  <g fill="#D4A017" filter="url(#gp)">
    <polygon points="1330,70 1333,79 1342,79 1335,85 1338,94 1330,88 1322,94 1325,85 1318,79 1327,79"
             opacity="0.75"/>
    <polygon points="1390,140 1392,146 1398,146 1393,150 1395,156 1390,152 1385,156 1387,150 1382,146 1388,146"
             opacity="0.5"/>
    <circle cx="1400" cy="80" r="2" opacity="0.6"/>
    <circle cx="1350" cy="110" r="1.5" opacity="0.45"/>
    <circle cx="1280" cy="60" r="1.5" opacity="0.4"/>
  </g>

  <!-- Teal sparkle dots -->
  <g fill="#53E2D9" opacity="0.4">
    <circle cx="1370" cy="260" r="3"/>
    <circle cx="1420" cy="200" r="2"/>
    <circle cx="820" cy="100" r="2"/>
    <circle cx="840" cy="330" r="2.5"/>
  </g>

  <!-- Horizontal lines -->
  <g stroke="#13B2AD" opacity="0.08" stroke-width="1">
    <line x1="0" y1="100" x2="700" y2="100"/>
    <line x1="0" y1="300" x2="700" y2="300"/>
  </g>

  <!-- Vertical accent line -->
  <line x1="700" y1="0" x2="700" y2="400" stroke="#13B2AD" stroke-width="1" opacity="0.07"/>

  <!-- Bottom bar -->
  <rect x="0" y="396" width="1442" height="4" fill="#13B2AD" opacity="0.4"/>

  <!-- Left text fade -->
  <rect width="880" height="400" fill="url(#leftFadeP)"/>
</svg>
